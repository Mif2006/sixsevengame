<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Knight Swap Puzzle</title>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: radial-gradient(ellipse 900px 600px at 50% -10%, #0d1326 0%, transparent 60%), #060810;
  color: #eef0fb; font-family: 'Segoe UI', system-ui, sans-serif;
  min-height: 100vh; display: flex; flex-direction: column; align-items: center;
  padding: 28px 16px 64px; overflow-x: hidden;
}
header { text-align: center; margin-bottom: 22px; z-index: 10; }
header h1 { font-size: 30px; font-weight: 800; letter-spacing: -0.8px; background: linear-gradient(180deg, #ffffff 10%, #b9c3ec 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
header p { font-size: 13px; color: #828aae; max-width: 500px; line-height: 1.5; }

.panel { display: none; width: 100%; max-width: 640px; }
.panel.active { display: flex; flex-direction: column; align-items: center; }

#level-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; width: 100%; }
.level-card {
  position: relative; display: flex; flex-direction: column; align-items: center; gap: 6px;
  padding: 22px 12px 18px; border-radius: 16px; border: 1px solid #2a3050;
  background: linear-gradient(160deg, #171d33 0%, #10142200 100%), #141a2c;
  color: #eef0fb; cursor: pointer; font-family: inherit;
  box-shadow: 0 10px 24px -10px rgba(0,0,0,0.55), 0 1px 0 rgba(255,255,255,0.05) inset;
  transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s, border-color 0.2s;
}
.level-card:hover:not(:disabled) { transform: translateY(-4px); border-color: #6fa8ff; box-shadow: 0 16px 32px -12px rgba(111,168,255,0.3); }
.level-card:disabled { cursor: not-allowed; opacity: 0.45; filter: saturate(0.4); }
.level-card.completed { border-color: #3dba7e; box-shadow: 0 10px 24px -10px rgba(61,186,126,0.3); }
.level-card-icon { font-size: 30px; line-height: 1; }
.level-card-label { font-size: 14px; font-weight: 800; }
.level-card-sub { font-size: 11px; color: #828aae; text-align: center; min-height: 28px; }

#controls { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; justify-content: center; }
.stat-chip {
  display: flex; align-items: center; gap: 6px; background: linear-gradient(180deg, #161c30, #11151f);
  border: 1px solid #2a3050; border-radius: 10px; padding: 7px 13px; font-size: 13px; color: #828aae;
  box-shadow: 0 1px 0 rgba(255,255,255,0.04) inset, 0 4px 10px -4px rgba(0,0,0,0.5);
}
.stat-chip b, .stat-chip span { color: #eef0fb; font-weight: 700; }
.ctrl-btn {
  background: linear-gradient(180deg, #1c2338, #141a2c); border: 1px solid #2a3050;
  color: #eef0fb; font-size: 13px; font-weight: 500; padding: 7px 15px; border-radius: 10px;
  cursor: pointer; font-family: inherit; box-shadow: 0 1px 0 rgba(255,255,255,0.05) inset;
  transition: background 0.15s, border-color 0.15s, transform 0.1s;
}
.ctrl-btn:hover { background: linear-gradient(180deg, #232b47, #1a2138); border-color: #6fa8ff; }
.ctrl-btn:active { transform: scale(0.95); }

/* FIX: Container now has max-width and lets Phaser handle the height via FIT mode */
#phaser-container {
  width: 100%; 
  max-width: 640px;
  display: flex; 
  justify-content: center;
  border-radius: 22px; 
  overflow: hidden; 
  position: relative;
  background: linear-gradient(160deg, #181f36 0%, #0d1120 55%, #0a0d18 100%);
  box-shadow: 0 40px 80px -20px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.04) inset;
  border: 1px solid rgba(255,255,255,0.06);
  padding: 14px;
}
canvas { touch-action: none; display: block; width: 100% !important; height: auto !important; }

#win-overlay { display: none; position: fixed; inset: 0; background: radial-gradient(ellipse at 50% 35%, rgba(20,50,40,0.45), rgba(6,8,16,0.92)); backdrop-filter: blur(4px); z-index: 100; align-items: center; justify-content: center; }
#win-overlay.show { display: flex; }
.win-card {
  background: linear-gradient(160deg, #16241c 0%, #0f1620 100%); border: 1px solid #3dba7e;
  border-radius: 22px; padding: 46px 54px; text-align: center; max-width: 400px; width: 90%;
  box-shadow: 0 0 80px rgba(61,186,126,0.25); color: white;
}
#win-trophy { font-size: 58px; margin-bottom: 12px; display: block; }
#win-title { font-size: 27px; font-weight: 800; margin-bottom: 6px; background: linear-gradient(180deg, #fff, #b9f3cf); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
#win-sub { font-size: 13px; color: #828aae; margin-bottom: 24px; line-height: 1.5; }
#win-badge { display: inline-block; background: linear-gradient(160deg,#1c3a2c,#142a20); border: 1px solid #3dba7e; border-radius: 40px; padding: 10px 26px; font-size: 14px; font-weight: 700; color: #ff62c4; margin-bottom: 30px; }

@media (max-width: 700px) {
  #level-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .level-card { padding: 16px 10px 14px; }
  .level-card-icon { font-size: 24px; }
  .level-card-label { font-size: 13px; }
}
</style>
</head>
<body>

<header>
  <h1>⚔ Knight Swap</h1>
  <p>Arrange rows so each is all 6s or all 7s, alternating. Swap pieces using chess knight moves.</p>
</header>

<div id="panel-levels" class="panel active">
  <div id="level-grid"></div>
</div>

<div id="panel-game" class="panel">
  <div id="controls">
    <div class="stat-chip">Moves: <span id="mc">0</span></div>
    <div class="stat-chip">Locked: <span id="lc">0</span>/<span id="total-cells">112</span></div>
    <button class="ctrl-btn" id="reset-btn">↺ Reset</button>
    <button class="ctrl-btn" id="levels-back-btn">← Levels</button>
  </div>
  <div id="phaser-container"></div>
</div>

<div id="win-overlay">
  <div class="win-card">
    <span id="win-trophy">🏆</span>
    <div id="win-title">Puzzle Complete!</div>
    <div id="win-sub">All rows are correct.<br>Every piece is home.</div>
    <div id="win-badge">Solved in <span id="win-mc">0</span> moves</div>
    <button class="ctrl-btn" style="background: linear-gradient(180deg, #4ed491, #2c9d68); border-color: #3dba7e; color: #06150d; font-weight:800; padding: 10px 24px;" onclick="closeWin()">Continue</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
//  GAME LOGIC
// ═══════════════════════════════════════════
const ROWS = 14, COLS = 8;
let currentLevelIndex = 0, grid = [], walls = new Set(), locked = [], moves = 0;
let game, gameScene;
let rowsCompletedBefore = new Set();

const LEVELS = [
  { id: 0, label: 'Tutorial', subtitle: 'Learn the moves', walls: 0, icon: '🎓' },
  { id: 1, label: 'Level 1', subtitle: 'Warming up', walls: 10, icon: '①' },
  { id: 2, label: 'Level 2', subtitle: 'Getting tighter', walls: 16, icon: '②' },
  { id: 3, label: 'Level 3', subtitle: 'Mind the gaps', walls: 21, icon: '③' },
  { id: 4, label: 'Level 4', subtitle: 'Double-lock unlocked', walls: 26, icon: '④' },
  { id: 5, label: 'Level 5', subtitle: 'The gauntlet', walls: 30, icon: '⑤' },
];

const wallKey = (r, c) => r + ',' + c;
const isWall = (r, c) => walls.has(wallKey(r, c));
const goalValue = (r) => r % 2 === 0 ? 6 : 7;
const isCorrect = (r, c, val) => !isWall(r,c) && val === goalValue(r);

function generateLevel(wallCount) {
  walls.clear();
  grid = Array.from({length: ROWS}, () => Array(COLS).fill(0));
  locked = Array.from({length: ROWS}, () => Array(COLS).fill(false));
  rowsCompletedBefore.clear();
  
  let placed = 0;
  while(placed < wallCount) {
    let r = Math.floor(Math.random() * ROWS), c = Math.floor(Math.random() * COLS);
    if(!walls.has(wallKey(r,c))) { walls.add(wallKey(r,c)); placed++; }
  }

  let pieces = [];
  for(let r=0; r<ROWS; r++) for(let c=0; c<COLS; c++) if(!isWall(r,c)) pieces.push(goalValue(r));
  
  for (let i = pieces.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pieces[i], pieces[j]] = [pieces[j], pieces[i]];
  }

  let idx = 0;
  for(let r=0; r<ROWS; r++) for(let c=0; c<COLS; c++) if(!isWall(r,c)) grid[r][c] = pieces[idx++];

  for(let i=0; i<300; i++) {
    let r1 = Math.floor(Math.random()*ROWS), c1 = Math.floor(Math.random()*COLS);
    if(isWall(r1,c1)) continue;
    let validMoves = getKnightMoves(r1, c1);
    if(validMoves.length > 0) {
      let [r2, c2] = validMoves[Math.floor(Math.random()*validMoves.length)];
      [grid[r1][c1], grid[r2][c2]] = [grid[r2][c2], grid[r1][c1]];
    }
  }
}

function getKnightMoves(r, c) {
  const deltas = [[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]];
  return deltas.map(([dr,dc]) => [r+dr, c+dc])
    .filter(([nr,nc]) => nr>=0 && nr<ROWS && nc>=0 && nc<COLS && !isWall(nr,nc));
}

// ═══════════════════════════════════════════
//  PHASER SCENE
// ═══════════════════════════════════════════
class MainScene extends Phaser.Scene {
  constructor() { super('MainScene'); }

  preload() {
    this.generatePieceTexture('piece_6', '#4fe3ff', '#1aa8d9', '#0c5e85');
    this.generatePieceTexture('piece_7', '#ff62c4', '#d62e96', '#831a63');
    this.generateWallTexture();
    this.generateGlowTextures();
    this.generateEffectTextures();
    
    let gfx = this.make.graphics({x:0, y:0, add:false});
    gfx.fillStyle(0xffffff);
    gfx.fillCircle(16, 16, 16);
    gfx.generateTexture('flare', 32, 32);
    gfx.destroy();
  }

  generatePieceTexture(key, c1, c2, c3) {
    const size = 128;
    const canvas = document.createElement('canvas');
    canvas.width = size; canvas.height = size;
    const ctx = canvas.getContext('2d');
    
    ctx.shadowColor = 'rgba(0,0,0,0.55)';
    ctx.shadowBlur = 10;
    ctx.shadowOffsetY = 6;
    
    const grad = ctx.createLinearGradient(0, 128, 128, 0);
    grad.addColorStop(0, c3);
    grad.addColorStop(0.48, c2);
    grad.addColorStop(1, c1);
    
    this.roundRect(ctx, 14, 14, 100, 100, 28);
    ctx.fillStyle = grad;
    ctx.fill();
    
    ctx.shadowColor = 'transparent';
    
    const radGrad = ctx.createRadialGradient(41, 36, 0, 41, 36, 45);
    radGrad.addColorStop(0, key === 'piece_6' ? 'rgba(255,255,255,0.55)' : 'rgba(255,255,255,0.5)');
    radGrad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = radGrad;
    this.roundRect(ctx, 14, 14, 100, 100, 28);
    ctx.fill();
    
    const innerGrad = ctx.createLinearGradient(64, 80, 64, 114);
    innerGrad.addColorStop(0, 'rgba(0,0,0,0)');
    innerGrad.addColorStop(1, 'rgba(0,0,0,0.3)');
    ctx.fillStyle = innerGrad;
    this.roundRect(ctx, 14, 14, 100, 100, 28);
    ctx.fill();
    
    ctx.strokeStyle = c1 + '88';
    ctx.lineWidth = 1.5;
    this.roundRect(ctx, 14, 14, 100, 100, 28);
    ctx.stroke();
    
    this.textures.addCanvas(key, canvas);
  }

  generateWallTexture() {
    const size = 128;
    const canvas = document.createElement('canvas');
    canvas.width = size; canvas.height = size;
    const ctx = canvas.getContext('2d');
    
    const grad = ctx.createRadialGradient(64, 45, 0, 64, 64, 60);
    grad.addColorStop(0, '#1a1e30');
    grad.addColorStop(0.75, '#0c0e18');
    
    ctx.fillStyle = grad;
    this.roundRect(ctx, 14, 14, 100, 100, 28);
    ctx.fill();
    
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.lineWidth = 1.5;
    this.roundRect(ctx, 14, 14, 100, 100, 28);
    ctx.stroke();
    
    this.textures.addCanvas('piece_wall', canvas);
  }

  generateGlowTextures() {
    let canvas = document.createElement('canvas');
    canvas.width = 140; canvas.height = 140;
    let ctx = canvas.getContext('2d');
    ctx.shadowColor = '#7db8ff';
    ctx.shadowBlur = 22;
    ctx.strokeStyle = '#7db8ff';
    ctx.lineWidth = 2.5;
    this.roundRect(ctx, 20, 20, 100, 100, 28);
    ctx.stroke();
    this.textures.addCanvas('glow_select', canvas);
    
    canvas = document.createElement('canvas');
    canvas.width = 140; canvas.height = 140;
    ctx = canvas.getContext('2d');
    const grad = ctx.createRadialGradient(70, 70, 30, 70, 70, 70);
    grad.addColorStop(0, 'rgba(255,255,255,0.16)');
    grad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, 140, 140);
    ctx.shadowColor = 'rgba(255,255,255,0.22)';
    ctx.shadowBlur = 10;
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 1.5;
    this.roundRect(ctx, 20, 20, 100, 100, 28);
    ctx.stroke();
    this.textures.addCanvas('glow_reach', canvas);
  }

  generateEffectTextures() {
    let canvas = document.createElement('canvas');
    canvas.width = 100; canvas.height = 100;
    let ctx = canvas.getContext('2d');
    ctx.strokeStyle = '#ffd166';
    ctx.lineWidth = 2;
    ctx.shadowColor = 'rgba(255,209,102,0.6)';
    ctx.shadowBlur = 12;
    ctx.beginPath();
    ctx.arc(50, 50, 40, 0, Math.PI * 2);
    ctx.stroke();
    this.textures.addCanvas('shock_ring', canvas);
    
    canvas = document.createElement('canvas');
    canvas.width = 300; canvas.height = 128;
    ctx = canvas.getContext('2d');
    const grad = ctx.createLinearGradient(0, 0, 300, 0);
    grad.addColorStop(0, 'rgba(255,247,214,0)');
    grad.addColorStop(0.1, 'rgba(255,247,214,0)');
    grad.addColorStop(0.45, 'rgba(255,209,102,0.55)');
    grad.addColorStop(0.55, 'rgba(255,122,61,0.55)');
    grad.addColorStop(0.9, 'rgba(255,247,214,0)');
    grad.addColorStop(1, 'rgba(255,247,214,0)');
    ctx.fillStyle = grad;
    ctx.filter = 'blur(6px)';
    ctx.fillRect(0, 0, 300, 128);
    this.textures.addCanvas('row_sweep', canvas);
    
    canvas = document.createElement('canvas');
    canvas.width = 512; canvas.height = 512;
    ctx = canvas.getContext('2d');
    const radGrad = ctx.createRadialGradient(256, 256, 0, 256, 256, 256);
    radGrad.addColorStop(0, 'rgba(255,209,102,0.16)');
    radGrad.addColorStop(1, 'rgba(255,209,102,0)');
    ctx.fillStyle = radGrad;
    ctx.fillRect(0, 0, 512, 512);
    this.textures.addCanvas('screen_flash', canvas);
  }

  roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  create() {
    gameScene = this;
    this.tileSize = 0; 
    this.gap = 5;
    this.pieces = {}; 
    this.selected = null;
    this.fxGroup = this.add.group();
    
    this.particles = this.add.particles(0, 0, 'flare', {
      speed: { min: 80, max: 200 },
      angle: { min: 200, max: 340 },
      scale: { start: 0.6, end: 0 },
      blendMode: 'ADD',
      lifespan: 600,
      tint: [0xffd166, 0xff7a3d, 0xff3d3d, 0xfff2b8],
      gravityY: 150,
      emitting: false
    });
    
    this.boardGroup = this.add.group();
    this.drawBoard();
    this.input.on('pointerdown', this.handleInput, this);
    
    // FIX: Scale board once on create. No need to listen to window resize 
    // because internal resolution is fixed and FIT mode handles the rest.
    this.scaleBoard();
  }

  drawBoard() {
    this.boardGroup.clear(true, true);
    for(let r=0; r<ROWS; r++) {
      for(let c=0; c<COLS; c++) {
        let texKey = isWall(r,c) ? 'piece_wall' : (grid[r][c] === 6 ? 'piece_6' : 'piece_7');
        let sprite = this.add.sprite(0, 0, texKey);
        
        let container = this.add.container(0, 0, [sprite]);
        container.setData('r', r); 
        container.setData('c', c); 
        container.setData('val', grid[r][c]);
        
        if(!isWall(r,c)) {
          let pieceVal = grid[r][c];
          let txtColor = pieceVal === 6 ? '#eafcff' : '#fff0f9';
          
          let txt = this.add.text(0, 0, pieceVal.toString(), {
            fontSize: '48px',
            fontFamily: 'Arial',
            color: txtColor,
            fontStyle: 'bold'
          }).setOrigin(0.5);
          
          txt.setShadow(0, 2, 'rgba(0,0,0,0.5)', 4, true, true);
          container.add(txt);
        }
        
        container.setSize(100, 100);
        container.setInteractive(new Phaser.Geom.Rectangle(-50, -50, 100, 100), Phaser.Geom.Rectangle.Contains);
        
        this.boardGroup.add(container);
        this.pieces[`${r},${c}`] = container;
      }
    }
  }

  // FIX: Calculate positions based on INTERNAL game width, not DOM container width
  scaleBoard() {
    const internalWidth = this.sys.game.config.width;
    const w = internalWidth - 28; // Account for padding
    if (w <= 0) return;
    
    this.gap = 5;
    this.tileSize = (w - (COLS + 1) * this.gap) / COLS;
    const boardW = COLS * this.tileSize + (COLS + 1) * this.gap;
    const offsetX = (internalWidth - boardW) / 2 + this.tileSize/2;
    const offsetY = 14 + this.tileSize/2;

    this.boardGroup.children.iterate((cont) => {
      let r = cont.getData('r'), c = cont.getData('c');
      let x = offsetX + c * (this.tileSize + this.gap);
      let y = offsetY + r * (this.tileSize + this.gap);
      
      cont.setPosition(x, y);
      cont.setScale(this.tileSize / 100);
    });
  }

  handleInput(pointer) {
    let clicked = null;
    this.boardGroup.children.iterate((cont) => {
      let bounds = cont.getBounds();
      if(bounds.contains(pointer.x, pointer.y)) clicked = cont;
    });

    if(!clicked) { this.deselect(); return; }
    let r = clicked.getData('r'), c = clicked.getData('c');
    if(isWall(r,c) || locked[r][c]) return;

    if(!this.selected) {
      this.select(clicked);
    } else {
      let sr = this.selected.getData('r'), sc = this.selected.getData('c');
      if(sr === r && sc === c) { this.deselect(); }
      else {
        let isValid = getKnightMoves(sr, sc).some(([mr, mc]) => mr === r && mc === c);
        if(isValid) this.swapPieces(this.selected, clicked);
        else this.select(clicked);
      }
    }
  }

  select(piece) {
    this.deselect();
    this.selected = piece;
    
    this.tweens.add({ 
      targets: piece, 
      y: piece.y - (this.tileSize * 0.08), 
      duration: 150, 
      ease: 'Back.easeOut' 
    });
    
    let glow = this.add.sprite(piece.x, piece.y, 'glow_select')
      .setScale(this.tileSize / 100)
      .setDepth(5);
    piece.setData('glow', glow);
    
    this.tweens.add({ 
      targets: glow, 
      alpha: { from: 1, to: 0.6 }, 
      scale: this.tileSize / 95,
      duration: 700, 
      yoyo: true, 
      repeat: -1 
    });

    let r = piece.getData('r'), c = piece.getData('c');
    getKnightMoves(r, c).forEach(([mr, mc]) => {
      let target = this.pieces[`${mr},${mc}`];
      if(target && !isWall(mr,mc) && !locked[mr][mc]) {
        let reach = this.add.sprite(target.x, target.y, 'glow_reach')
          .setScale(this.tileSize / 100)
          .setAlpha(0.7)
          .setDepth(4);
        target.setData('reach', reach);
        this.tweens.add({ 
          targets: reach, 
          alpha: { from: 0.7, to: 0.3 },
          scale: this.tileSize / 95,
          duration: 650, 
          yoyo: true, 
          repeat: -1 
        });
      }
    });
  }

  deselect() {
    if(this.selected) {
      this.tweens.add({ 
        targets: this.selected, 
        y: this.selected.y + (this.tileSize * 0.08), 
        duration: 150 
      });
      if(this.selected.getData('glow')) {
        this.selected.getData('glow').destroy();
        this.selected.setData('glow', null);
      }
    }
    this.selected = null;
    
    this.boardGroup.children.iterate(c => {
      if(c.getData('reach')) {
        c.getData('reach').destroy();
        c.setData('reach', null);
      }
    });
  }

  swapPieces(p1, p2) {
    let r1 = p1.getData('r'), c1 = p1.getData('c');
    let r2 = p2.getData('r'), c2 = p2.getData('c');
    this.deselect();

    this.tweens.add({ 
      targets: p1, 
      x: p2.x, 
      y: p2.y, 
      duration: 350, 
      ease: 'Cubic.easeInOut' 
    });
    this.tweens.add({
      targets: p2, 
      x: p1.x, 
      y: p1.y, 
      duration: 350, 
      ease: 'Cubic.easeInOut',
      onComplete: () => {
        [grid[r1][c1], grid[r2][c2]] = [grid[r2][c2], grid[r1][c1]];
        
        p1.setData('r', r2); 
        p1.setData('c', c2); 
        p1.setData('val', grid[r2][c2]);
        p2.setData('r', r1); 
        p2.setData('c', c1); 
        p2.setData('val', grid[r1][c1]);
        
        this.pieces[`${r2},${c2}`] = p1; 
        this.pieces[`${r1},${c1}`] = p2;

        moves++; 
        document.getElementById('mc').innerText = moves;
        
        this.checkNewlyCompletedRows();
      }
    });
  }

  checkNewlyCompletedRows() {
    let newlyCompleted = [];
    
    for(let r=0; r<ROWS; r++) {
      let isComplete = true;
      for(let c=0; c<COLS; c++) {
        if(!isWall(r,c) && !isCorrect(r, c, grid[r][c])) {
          isComplete = false;
          break;
        }
      }
      
      if(isComplete && !rowsCompletedBefore.has(r)) {
        newlyCompleted.push(r);
        rowsCompletedBefore.add(r);
      } else if(!isComplete && rowsCompletedBefore.has(r)) {
        rowsCompletedBefore.delete(r);
      }
    }
    
    newlyCompleted.forEach(r => this.triggerRowFireFX(r));
    
    let lockCount = 0;
    for(let r=0; r<ROWS; r++) {
      for(let c=0; c<COLS; c++) {
        if(locked[r][c]) lockCount++;
      }
    }
    document.getElementById('lc').innerText = lockCount;
    
    if(newlyCompleted.length > 0) {
      setTimeout(() => this.checkWin(), 1000);
    }
  }

  triggerRowFireFX(rowIndex) {
    const firstCell = this.pieces[`${rowIndex},0`];
    const lastCell = this.pieces[`${rowIndex},${COLS-1}`];
    if(!firstCell || !lastCell) return;
    
    const midX = (firstCell.x + lastCell.x) / 2;
    const rowY = firstCell.y;
    
    this.cameras.main.shake(400, 0.015);
    
    let flash = this.add.sprite(this.scale.width/2, this.scale.height/2, 'screen_flash')
      .setAlpha(0)
      .setDepth(100);
    flash.setDisplaySize(this.scale.width * 2, this.scale.height * 2);
    this.tweens.add({ 
      targets: flash, 
      alpha: { from: 0, to: 1, back: 0 }, 
      duration: 100, 
      yoyo: true, 
      hold: 100,
      onComplete: () => flash.destroy()
    });
    
    let sweep = this.add.sprite(firstCell.x - 100, rowY, 'row_sweep')
      .setDepth(50)
      .setAlpha(0.8);
    sweep.setDisplaySize(200, this.tileSize);
    this.tweens.add({ 
      targets: sweep, 
      x: lastCell.x + 200, 
      duration: 650, 
      ease: 'Linear',
      onComplete: () => sweep.destroy()
    });
    
    const cells = [];
    for(let c=0; c<COLS; c++) {
      if(!isWall(rowIndex, c)) {
        cells.push(this.pieces[`${rowIndex},${c}`]);
      }
    }
    
    cells.forEach((cell, i) => {
      this.time.delayedCall(i * 36, () => {
        this.tweens.add({
          targets: cell,
          scaleX: cell.scaleX * 1.25,
          scaleY: cell.scaleY * 1.25,
          duration: 200,
          ease: 'Back.easeOut',
          yoyo: true
        });
        
        let ring = this.add.sprite(cell.x, cell.y, 'shock_ring')
          .setScale(0.2)
          .setAlpha(1)
          .setDepth(60);
        this.tweens.add({ 
          targets: ring, 
          scale: 2.5, 
          alpha: 0, 
          duration: 550, 
          ease: 'Cubic.easeOut', 
          onComplete: () => ring.destroy() 
        });
        
        this.particles.emitParticleAt(cell.x, cell.y + 10, 12);
      });
    });
    
    const bannerBg = this.add.graphics().setDepth(110);
    bannerBg.fillStyle(0xff7a3d, 1);
    bannerBg.fillRoundedRect(-90, -22, 180, 44, 22);
    const bannerTxt = this.add.text(0, 0, '🔥 Row Locked!', { 
      fontSize: '20px', 
      color: '#2a1300', 
      fontStyle: 'bold' 
    }).setOrigin(0.5).setDepth(111);
    const banner = this.add.container(midX, rowY - 50, [bannerBg, bannerTxt])
      .setDepth(110)
      .setScale(0);
    
    this.tweens.add({
      targets: banner, 
      scale: 1.15, 
      duration: 220, 
      ease: 'Back.easeOut',
      yoyo: true, 
      hold: 900,
      onComplete: () => banner.destroy()
    });
  }

  checkWin() {
    let allCorrect = true;
    for(let r=0; r<ROWS; r++) {
      for(let c=0; c<COLS; c++) {
        if(!isWall(r,c) && !isCorrect(r, c, grid[r][c])) {
          allCorrect = false;
          break;
        }
      }
    }
    
    if(allCorrect) {
      document.getElementById('win-mc').innerText = moves;
      document.getElementById('win-overlay').classList.add('show');
    }
  }
}

// ═══════════════════════════════════════════
//  INITIALIZATION
// ═══════════════════════════════════════════
const config = {
  type: Phaser.AUTO,
  parent: 'phaser-container',
  width: 800, 
  height: 1400, // FIX: Increased height to ensure all 14 rows fit comfortably
  backgroundColor: '#0d1120',
  scene: MainScene,
  scale: { 
    mode: Phaser.Scale.FIT, 
    autoCenter: Phaser.Scale.CENTER_BOTH // FIX: Center both horizontally and vertically
  },
  fps: { target: 60 }
};

function renderLevelSelect() {
  const gridEl = document.getElementById('level-grid');
  gridEl.innerHTML = '';
  LEVELS.forEach((lvl, i) => {
    let btn = document.createElement('button');
    btn.className = 'level-card';
    btn.innerHTML = `
      <div class="level-card-icon">${lvl.icon}</div>
      <div class="level-card-label">${lvl.label}</div>
      <div class="level-card-sub">${lvl.subtitle}</div>
    `;
    btn.onclick = () => startGame(i);
    gridEl.appendChild(btn);
  });
}

function startGame(idx) {
  currentLevelIndex = idx;
  generateLevel(LEVELS[idx].walls);
  moves = 0;
  document.getElementById('mc').innerText = '0';
  document.getElementById('lc').innerText = '0';
  document.getElementById('total-cells').innerText = (ROWS * COLS - walls.size);
  
  document.getElementById('panel-levels').classList.remove('active');
  document.getElementById('panel-game').classList.add('active');
  
  setTimeout(() => {
    if (!game) {
      game = new Phaser.Game(config);
    } else {
      gameScene.scene.restart();
    }
  }, 50);
}

function closeWin() {
  document.getElementById('win-overlay').classList.remove('show');
  document.getElementById('panel-game').classList.remove('active');
  document.getElementById('panel-levels').classList.add('active');
}

document.getElementById('reset-btn').onclick = () => startGame(currentLevelIndex);
document.getElementById('levels-back-btn').onclick = () => {
  document.getElementById('panel-game').classList.remove('active');
  document.getElementById('panel-levels').classList.add('active');
};

renderLevelSelect();
</script>
